[package]
name = "aztec-rs"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for the Aztec Network"
license = "Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
async-trait = "0.1"
thiserror = "2"
url = "2"
hex = "0.4"
ark-bn254 = "0.5"
ark-ff = "0.5"
ark-serialize = "0.5"
rand = "0.8"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
