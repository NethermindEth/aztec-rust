[package]
name = "aztec-pxe-client"
version = "0.1.1"
edition = "2021"
description = "PXE (Private eXecution Environment) client for the Aztec Rust SDK"
license = "Apache-2.0"

[dependencies]
aztec-core = { path = "../core" }
aztec-rpc = { path = "../rpc" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
