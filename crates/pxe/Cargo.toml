[package]
name = "aztec-pxe"
version = "0.3.2"
edition = "2021"
description = "Embedded PXE (Private eXecution Environment) for the Aztec Rust SDK"
license = "Apache-2.0"

[dependencies]
aztec-core = { path = "../core", version = "0.3.2" }
aztec-crypto = { path = "../crypto", version = "0.3.2" }
aztec-node-client = { path = "../node-client", version = "0.3.2" }
aztec-pxe-client = { path = "../pxe-client", version = "0.3.2" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "process", "fs"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
